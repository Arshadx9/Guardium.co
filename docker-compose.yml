services:
  mongo:
    image: mongo:6.0
    container_name: api-monitoring-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - api-monitoring-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: api-monitoring-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: api_user
      RABBITMQ_DEFAULT_PASS: secure_password
      RABBITMQ_DEFAULT_VHOST: api_monitoring
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - api-monitoring-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: api-monitoring-api
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/Guardium
      RABBITMQ_URL: amqp://api_user:secure_password@rabbitmq:5672/api_monitoring
      RABBITMQ_QUEUE: api_hits
      JWT_SECRET: ${JWT_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      CORS_ORIGIN: http://13.49.148.61:3000
    ports:
      - "5000:5000"
    networks:
      - api-monitoring-network
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: api-monitoring-web
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    networks:
      - api-monitoring-network
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mongo_data:
  rabbitmq_data:

networks:
  api-monitoring-network:
    driver: bridge